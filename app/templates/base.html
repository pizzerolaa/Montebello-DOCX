<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Montebello DOCX{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
    <script src="{{ url_for('static', path='js/app.js') }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('project_list') }}">Montebello DOCX</a>
      <nav>
        <a href="{{ url_for('project_list') }}">Proyectos</a>
        <a class="button button-small" href="{{ url_for('project_new') }}">Nuevo proyecto</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
